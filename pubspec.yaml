name: squirrel_go_app
description: 松鼠账本 - 智能家庭财务管家
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # 状态管理
  provider: ^6.1.1
  # 网络请求
  http: ^1.1.0
  dio: ^5.4.0
  # 本地存储
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  # 语音识别
  speech_to_text: ^6.6.0
  permission_handler: ^11.1.0
  # UI 组件
  fl_chart: ^0.65.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/
